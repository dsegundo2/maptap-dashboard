name: Refresh data and deploy Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Refresh public MapTap snapshot
        run: npm run data:refresh
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Install Chromium
        if: github.event_name == 'push'
        run: npx playwright install --with-deps chromium
      - name: Run Chromium UI tests
        if: github.event_name == 'push'
        run: npm run test:ui
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
